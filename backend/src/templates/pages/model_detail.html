{% extends "base.html" %}
{% block title %}{{ model.display_name }} - myQuant{% endblock %}

{% block content %}
<div x-data="{
    stockCode: '{{ config.stock_code or '' }}',
    short: {{ config.params.short if config and config.params else model.default_params.short }},
    long: {{ config.params.long if config and config.params else model.default_params.long }},
    positionPct: {{ config.position_pct if config else model.default_params.position_pct }},
    timeRange: '{{ config.time_range if config else '1y' }}',
    result: null,
    loading: false,
    error: '',

    async generateSignals() {
        if (!this.stockCode) { this.error = '请输入股票代码'; return; }
        if (this.short >= this.long) { this.error = '快线周期必须小于慢线周期'; return; }
        this.loading = true; this.error = '';
        const resp = await fetch(`/api/models/{{ model.model_name }}/signals`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                stock_code: this.stockCode,
                short: this.short,
                long: this.long,
                position_pct: this.positionPct,
                time_range: this.timeRange,
            })
        });
        const data = await resp.json();
        if (!resp.ok) { this.error = data.error || '生成失败'; this.loading = false; return; }
        this.result = data;
        this.loading = false;
        this.$nextTick(() => this.renderChart());
    },

    renderChart() {
        if (!this.result || !this.result.kline) return;
        const el = document.getElementById('ma-chart');
        const old = echarts.getInstanceByDom(el);
        if (old) old.dispose();
        const chart = echarts.init(el);

        const klineData = this.result.kline.map(d => [d[1], d[2], d[3], d[4]]);
        const dates = this.result.kline.map(d => d[0]);
        const maShortData = this.result.ma_short;
        const maLongData = this.result.ma_long;
        const buyMarks = this.result.signals.filter(s => s.signal_type === 'BUY').map(s => ({
            coord: [s.trade_date, s.signal_price],
            value: '买入',
            itemStyle: { color: '#ef4444' }
        }));
        const sellMarks = this.result.signals.filter(s => s.signal_type === 'SELL').map(s => ({
            coord: [s.trade_date, s.signal_price],
            value: '卖出',
            itemStyle: { color: '#22c55e' }
        }));

        chart.setOption({
            tooltip: { trigger: 'axis' },
            grid: { left: 80, right: 20, top: 40, bottom: 40 },
            xAxis: { type: 'category', data: dates, axisLabel: { formatter: v => v.substring(5) } },
            yAxis: { type: 'value', scale: true },
            series: [
                { name: 'K线', type: 'candlestick', data: klineData,
                  itemStyle: { color: '#ef4444', color0: '#22c55e', borderColor: '#ef4444', borderColor0: '#22c55e' } },
                { name: `MA{{ model.default_params.short }}`, type: 'line', data: maShortData,
                  smooth: true, symbol: 'none', lineStyle: { width: 1.5, color: '#3b82f6' } },
                { name: `MA{{ model.default_params.long }}`, type: 'line', data: maLongData,
                  smooth: true, symbol: 'none', lineStyle: { width: 1.5, color: '#f59e0b' } },
                { name: '买入', type: 'scatter', data: buyMarks,
                  symbol: 'triangle', symbolSize: 14, itemStyle: { color: '#ef4444' } },
                { name: '卖出', type: 'scatter', data: sellMarks,
                  symbol: 'triangle', symbolSize: 14, symbolRotate: 180, itemStyle: { color: '#22c55e' } },
            ]
        });
        window.addEventListener('resize', () => chart.resize());
    }
}">

    <!-- Back link -->
    <a href="/models" class="text-sm text-blue-600 hover:underline mb-4 inline-block">&larr; 返回模型列表</a>

    <!-- Model Intro -->
    <div class="bg-white rounded-lg border p-5 mb-4">
        <h2 class="text-xl font-bold text-gray-800 mb-2">{{ model.display_name }}</h2>
        <p class="text-sm text-gray-500 leading-relaxed">{{ model.description }}</p>
        <div class="flex flex-wrap gap-2 mt-3">
            <span class="text-xs px-2 py-0.5 rounded bg-blue-100 text-blue-700">趋势跟踪</span>
            <span class="text-xs px-2 py-0.5 rounded bg-gray-100 text-gray-500">仅做多</span>
        </div>
    </div>

    <!-- Config Form -->
    <div class="bg-white rounded-lg border p-5 mb-4">
        <h3 class="text-sm font-semibold text-gray-700 mb-3">参数配置</h3>
        <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-3">
            <div>
                <label class="block text-xs text-gray-400 mb-1">股票代码</label>
                <input type="text" x-model="stockCode" placeholder="例: 000001.SZ"
                       class="w-full border rounded px-3 py-1.5 text-sm focus:ring-2 focus:ring-blue-300 focus:border-blue-400 outline-none">
            </div>
            <div>
                <label class="block text-xs text-gray-400 mb-1">快线周期</label>
                <input type="number" x-model.number="short" min="1" max="200"
                       class="w-full border rounded px-3 py-1.5 text-sm focus:ring-2 focus:ring-blue-300 focus:border-blue-400 outline-none">
            </div>
            <div>
                <label class="block text-xs text-gray-400 mb-1">慢线周期</label>
                <input type="number" x-model.number="long" min="2" max="250"
                       class="w-full border rounded px-3 py-1.5 text-sm focus:ring-2 focus:ring-blue-300 focus:border-blue-400 outline-none">
            </div>
            <div>
                <label class="block text-xs text-gray-400 mb-1">仓位比例 (%)</label>
                <input type="number" x-model.number="positionPct" min="1" max="100"
                       class="w-full border rounded px-3 py-1.5 text-sm focus:ring-2 focus:ring-blue-300 focus:border-blue-400 outline-none">
            </div>
            <div>
                <label class="block text-xs text-gray-400 mb-1">时间范围</label>
                <div class="flex gap-0.5">
                    <button class="flex-1 py-1.5 text-xs rounded"
                            :class="timeRange === '1m' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-500'"
                            @click="timeRange = '1m'">1月</button>
                    <button class="flex-1 py-1.5 text-xs rounded"
                            :class="timeRange === '3m' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-500'"
                            @click="timeRange = '3m'">3月</button>
                    <button class="flex-1 py-1.5 text-xs rounded"
                            :class="timeRange === '6m' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-500'"
                            @click="timeRange = '6m'">6月</button>
                    <button class="flex-1 py-1.5 text-xs rounded"
                            :class="timeRange === '1y' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-500'"
                            @click="timeRange = '1y'">1年</button>
                </div>
            </div>
        </div>
        <button class="bg-blue-600 text-white px-6 py-2 rounded text-sm font-medium hover:bg-blue-700 disabled:opacity-50"
                @click="generateSignals()" :disabled="loading">
            <span x-show="!loading">生成信号</span>
            <span x-show="loading" class="inline-flex items-center gap-1">
                <span class="inline-block w-3 h-3 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
                计算中...
            </span>
        </button>
        <span x-show="error" class="ml-3 text-sm text-red-500" x-text="error"></span>
    </div>

    <!-- Chart -->
    <div x-show="result" class="bg-white rounded-lg border mb-4">
        <div id="ma-chart" style="height: 450px;"></div>
    </div>

    <!-- Performance Stats -->
    <div x-show="result && result.performance" class="bg-white rounded-lg border p-4 mb-4">
        <h3 class="text-sm font-semibold text-gray-700 mb-3">绩效统计</h3>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 text-sm">
            <div>
                <span class="text-gray-400">总信号数</span>
                <p class="font-semibold text-gray-800" x-text="result.performance.total_signals"></p>
            </div>
            <div>
                <span class="text-gray-400">交易对</span>
                <p class="font-semibold text-gray-800" x-text="result.performance.trade_pairs"></p>
            </div>
            <div>
                <span class="text-gray-400">胜率</span>
                <p class="font-semibold" :class="result.performance.win_rate >= 50 ? 'text-red-600' : 'text-green-600'"
                   x-text="result.performance.win_rate + '%'"></p>
            </div>
            <div>
                <span class="text-gray-400">累计收益率</span>
                <p class="font-semibold" :class="result.performance.cumulative_return >= 0 ? 'text-red-600' : 'text-green-600'"
                   x-text="(result.performance.cumulative_return >= 0 ? '+' : '') + result.performance.cumulative_return + '%'"></p>
            </div>
        </div>
    </div>

    <!-- Signal Table -->
    <div x-show="result && result.signals && result.signals.length > 0" class="bg-white rounded-lg border overflow-hidden">
        <div class="px-4 py-3 border-b bg-gray-50">
            <h3 class="text-sm font-semibold text-gray-700">交易信号</h3>
        </div>
        <table class="w-full text-sm">
            <thead class="bg-gray-50 border-b">
                <tr>
                    <th class="text-left px-4 py-2 font-medium text-gray-600">日期</th>
                    <th class="text-left px-4 py-2 font-medium text-gray-600">信号</th>
                    <th class="text-right px-4 py-2 font-medium text-gray-600">价格</th>
                </tr>
            </thead>
            <tbody>
                <template x-for="s in result.signals" :key="s.trade_date + s.signal_type">
                    <tr class="border-b hover:bg-gray-50">
                        <td class="px-4 py-1.5 text-xs text-gray-600" x-text="s.trade_date"></td>
                        <td class="px-4 py-1.5">
                            <span class="text-xs px-2 py-0.5 rounded"
                                  :class="s.signal_type === 'BUY' ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'"
                                  x-text="s.signal_type === 'BUY' ? '买入' : '卖出'"></span>
                        </td>
                        <td class="px-4 py-1.5 text-right font-mono text-xs"
                            x-text="s.signal_price.toFixed(2)"></td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>

    <!-- No signal message -->
    <div x-show="result && result.signals && result.signals.length === 0"
         class="bg-white rounded-lg border p-8 text-center text-gray-400">
        <p>该区间内未产生交易信号</p>
    </div>

</div>
{% endblock %}

{% block scripts %}
<style>[x-cloak] { display: none !important; }</style>
{% endblock %}
