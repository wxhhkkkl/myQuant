{% extends "base.html" %}
{% block title %}回测 - myQuant{% endblock %}

{% block content %}
<div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-800">策略回测</h1>
    <p class="text-gray-500 mt-1">配置参数，运行回测，查看收益曲线</p>
</div>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <div class="lg:col-span-1">
        <div class="bg-white rounded-lg border p-6">
            <h3 class="font-semibold text-gray-700 mb-4">回测参数</h3>
            <form id="backtest-form"
                  hx-post="/api/backtest/run"
                  hx-target="#backtest-results"
                  hx-indicator="#backtest-spinner">
                <div class="space-y-3">
                    <div>
                        <label class="text-xs text-gray-500">模型</label>
                        <select name="model_name" class="w-full border rounded px-3 py-1.5 text-sm">
                            <option value="ma_cross">双均线模型 (MA5/MA20)</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs text-gray-500">股票代码</label>
                        <input name="stock_code" value="000001.SZ"
                               class="w-full border rounded px-3 py-1.5 text-sm">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="text-xs text-gray-500">短周期</label>
                            <input name="short" type="number" value="5"
                                   class="w-full border rounded px-3 py-1.5 text-sm">
                        </div>
                        <div>
                            <label class="text-xs text-gray-500">长周期</label>
                            <input name="long" type="number" value="20"
                                   class="w-full border rounded px-3 py-1.5 text-sm">
                        </div>
                    </div>
                    <div>
                        <label class="text-xs text-gray-500">起始日期</label>
                        <input name="start_date" type="date" value="2025-01-01"
                               class="w-full border rounded px-3 py-1.5 text-sm">
                    </div>
                    <div>
                        <label class="text-xs text-gray-500">结束日期</label>
                        <input name="end_date" type="date" value="2025-12-31"
                               class="w-full border rounded px-3 py-1.5 text-sm">
                    </div>
                    <div>
                        <label class="text-xs text-gray-500">初始资金</label>
                        <input name="initial_capital" type="number" value="100000"
                               class="w-full border rounded px-3 py-1.5 text-sm">
                    </div>
                    <button type="submit"
                            class="w-full bg-blue-600 text-white py-2 rounded text-sm font-medium hover:bg-blue-700">
                        运行回测
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="lg:col-span-2">
        <div id="backtest-spinner" class="htmx-indicator text-sm text-gray-400 mb-4">回测运行中...</div>
        <div id="backtest-results"></div>
    </div>
</div>

<div class="mt-8">
    <h3 class="font-semibold text-gray-700 mb-4">历史回测记录</h3>
    <div hx-get="/api/backtest/history" hx-trigger="load" hx-target="this">
        <p class="text-gray-400 text-sm">加载中...</p>
    </div>
</div>
{% endblock %}
