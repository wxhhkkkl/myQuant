{% if rows %}
<div class="bg-white rounded-lg border overflow-hidden">
    <table class="w-full text-xs">
        <thead class="bg-gray-50 text-gray-500">
            <tr>
                <th class="px-4 py-2 text-left">模型</th>
                <th class="px-4 py-2 text-left">股票</th>
                <th class="px-4 py-2 text-right">初始资金</th>
                <th class="px-4 py-2 text-right">收益率</th>
                <th class="px-4 py-2 text-right">交易次数</th>
                <th class="px-4 py-2 text-left">时间范围</th>
            </tr>
        </thead>
        <tbody class="divide-y">
            {% for r in rows %}
            <tr class="hover:bg-gray-50 cursor-pointer"
                hx-get="/api/backtest/{{ r.run_id }}"
                hx-target="#backtest-results">
                <td class="px-4 py-2 font-medium">{{ r.model_name }}</td>
                <td class="px-4 py-2 font-mono">{{ r.stock_code }}</td>
                <td class="px-4 py-2 text-right font-mono">{{ "%.0f"|format(r.initial_capital) }}</td>
                <td class="px-4 py-2 text-right font-mono {% if r.total_return >= 0 %}text-red-600{% else %}text-green-600{% endif %}">
                    {{ "%.2f"|format(r.total_return * 100) }}%
                </td>
                <td class="px-4 py-2 text-right">{{ r.trade_count }}</td>
                <td class="px-4 py-2 font-mono text-gray-400">{{ r.start_date }} ~ {{ r.end_date }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% else %}
<p class="text-gray-400 text-sm py-4">暂无回测记录</p>
{% endif %}
