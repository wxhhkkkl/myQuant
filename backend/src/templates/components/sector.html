<div class="space-y-4">
    <h3 class="text-lg font-semibold text-gray-700">板块信息</h3>

    {% if sector %}
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="p-4 bg-blue-50 rounded-lg">
            <div class="text-xs text-blue-400">申万一级行业</div>
            <div class="text-lg font-medium text-blue-900">{{ sector.industry or '未知' }}</div>
        </div>
        <div class="p-4 bg-green-50 rounded-lg">
            <div class="text-xs text-green-400">申万二级行业</div>
            <div class="text-lg font-medium text-green-900">{{ sector.sub_industry or '未知' }}</div>
        </div>
    </div>

    {% if sector.industry %}
    <div class="mt-4 p-4 bg-gray-50 rounded-lg">
        <h4 class="text-sm font-medium text-gray-600 mb-2">同行业股票</h4>
        <p class="text-xs text-gray-400" hx-get="/api/stocks/search?q={{ sector.industry }}"
           hx-trigger="load" hx-target="this">
            加载中...
        </p>
    </div>
    {% endif %}
    {% else %}
    <p class="text-gray-400 text-sm">暂无板块数据</p>
    {% endif %}
</div>
