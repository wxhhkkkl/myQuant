{% if orders %}
<table class="w-full text-sm">
    <thead>
        <tr class="text-left text-gray-500 border-b">
            <th class="py-2 pr-2">ID</th>
            <th class="py-2 pr-2">股票</th>
            <th class="py-2 pr-2">方向</th>
            <th class="py-2 pr-2">价格</th>
            <th class="py-2 pr-2">数量</th>
            <th class="py-2 pr-2">状态</th>
            <th class="py-2">操作</th>
        </tr>
    </thead>
    <tbody>
        {% for o in orders %}
        <tr class="border-b last:border-0">
            <td class="py-2 pr-2 text-gray-400">{{ o.id }}</td>
            <td class="py-2 pr-2 font-mono">{{ o.stock_code }}</td>
            <td class="py-2 pr-2">
                <span class="px-1.5 py-0.5 text-xs rounded
                    {% if o.order_type == 'BUY' %}bg-red-100 text-red-700
                    {% else %}bg-green-100 text-green-700{% endif %}">
                    {{ o.order_type }}
                </span>
            </td>
            <td class="py-2 pr-2">{{ "%.2f"|format(o.price) }}</td>
            <td class="py-2 pr-2">{{ o.quantity }}</td>
            <td class="py-2 pr-2">
                <span class="px-1.5 py-0.5 text-xs rounded
                    {% if o.status == 'submitted' %}bg-yellow-100 text-yellow-700
                    {% elif o.status == 'cancelled' %}bg-gray-100 text-gray-500
                    {% else %}bg-green-100 text-green-700{% endif %}">
                    {{ o.status }}
                </span>
            </td>
            <td class="py-2">
                {% if o.status == 'submitted' %}
                <button hx-delete="/api/orders/{{ o.id }}"
                        hx-target="closest tr" hx-swap="outerHTML"
                        class="text-xs text-red-500 hover:text-red-700">
                    撤销
                </button>
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<p class="text-gray-400 text-sm py-4">暂无订单</p>
{% endif %}
