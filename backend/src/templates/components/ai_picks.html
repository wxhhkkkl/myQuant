<div class="bg-white border rounded-lg p-6">
    <h3 class="text-lg font-semibold text-gray-700 mb-4">AI选股推荐</h3>

    {% if recommendations %}
    <div class="space-y-3">
        {% for r in recommendations %}
        <div class="flex items-center justify-between border-b pb-3 last:border-0">
            <div>
                <a href="/stocks/{{ r.stock_code }}"
                   class="text-sm font-medium text-blue-700 hover:underline">
                    {{ r.stock_name or '' }} ({{ r.stock_code }})
                </a>
                <p class="text-xs text-gray-500 mt-1">{{ r.reason or '' }}</p>
            </div>
            <span class="text-sm font-bold {% if r.score >= 80 %}text-green-600{% elif r.score >= 60 %}text-yellow-600{% else %}text-gray-400{% endif %}">
                {{ r.score }}分
            </span>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <p class="text-gray-400 text-sm">
        AI分析暂时无结果，请检查DeepSeek API配置或稍后重试。
    </p>
    {% endif %}
</div>
