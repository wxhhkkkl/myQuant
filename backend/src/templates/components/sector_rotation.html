<div x-data="{
    timeRange: '1y',
    granularity: 'monthly',
    rotationData: null,
    loading: false,
    levelsParam: '',
    sectorCount: 0,

    async loadRotation() {
        this.loading = true;
        const lvl = this.levelsParam || '';
        const resp = await fetch(`/api/sectors/rotation?time_range=${this.timeRange}&granularity=${this.granularity}&levels=${encodeURIComponent(lvl)}`);
        this.rotationData = await resp.json();
        if (this.rotationData && this.rotationData.leaders) {
            const all = new Set(this.rotationData.leaders.flatMap(l => l.top3.map(t => t.sector)));
            this.sectorCount = all.size;
        }
        this.loading = false;
        this.$nextTick(() => this.renderChart());
    },

    renderChart() {
        const el = document.getElementById('rotation-chart');
        if (!el || !this.rotationData || !this.rotationData.leaders || this.rotationData.leaders.length === 0) return;

        const old = echarts.getInstanceByDom(el);
        if (old) old.dispose();

        const chart = echarts.init(el);

        const periods = this.rotationData.periods;
        const leaders = this.rotationData.leaders;

        const allSectors = [...new Set(leaders.flatMap(l => l.top3.map(t => t.sector)))].sort();

        const heatData = [];
        const maxAbs = Math.max(...leaders.flatMap(l => l.top3.map(t => Math.abs(t.change_pct))));

        periods.forEach((p, xi) => {
            const entry = leaders.find(l => l.period.startsWith(p) || l.period === p);
            if (!entry) return;
            entry.top3.forEach(t => {
                const yi = allSectors.indexOf(t.sector);
                heatData.push([xi, yi, t.change_pct]);
            });
        });

        chart.setOption({
            tooltip: {
                formatter: function(params) {
                    const p = periods[params.data[0]];
                    const s = allSectors[params.data[1]];
                    const v = params.data[2];
                    return `<strong>${p}</strong><br>${s}: ${v > 0 ? '+' : ''}${v}%`;
                }
            },
            grid: { left: 100, right: 60, top: 20, bottom: 60 },
            xAxis: {
                type: 'category',
                data: periods,
                axisLabel: { rotate: 45, fontSize: 10 },
                position: 'bottom',
            },
            yAxis: {
                type: 'category',
                data: allSectors,
                axisLabel: { fontSize: 11 },
                inverse: true,
            },
            visualMap: {
                min: -maxAbs,
                max: maxAbs,
                calculable: true,
                orient: 'horizontal',
                left: 'center',
                bottom: 0,
                inRange: { color: ['#22c55e', '#f8f8f8', '#ef4444'] },
                text: ['涨', '跌'],
            },
            series: [{
                type: 'heatmap',
                data: heatData,
                label: {
                    show: true,
                    fontSize: 10,
                    formatter: function(params) {
                        const v = params.data[2];
                        return v > 0 ? '+' + v + '%' : v + '%';
                    }
                },
                emphasis: {
                    itemStyle: { shadowBlur: 10, shadowColor: 'rgba(0, 0, 0, 0.5)' }
                },
            }],
        });

        window.addEventListener('resize', () => chart.resize());
    }
}" x-init="levelsParam = levelsParam || '一级,二级,三级'; loadRotation()"
     @sector-levels-changed.window="levelsParam = $event.detail.levelsParam; loadRotation()">

    <!-- Controls -->
    <div class="flex items-center gap-4 mb-4 flex-wrap">
        <div class="flex items-center gap-1 text-sm">
            <span class="text-gray-500">时间:</span>
            <button class="px-2 py-1 rounded text-xs"
                    :class="timeRange === '1m' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'"
                    @click="timeRange = '1m'; loadRotation()">1月</button>
            <button class="px-2 py-1 rounded text-xs"
                    :class="timeRange === '3m' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'"
                    @click="timeRange = '3m'; loadRotation()">3月</button>
            <button class="px-2 py-1 rounded text-xs"
                    :class="timeRange === '6m' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'"
                    @click="timeRange = '6m'; loadRotation()">6月</button>
            <button class="px-2 py-1 rounded text-xs"
                    :class="timeRange === '1y' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'"
                    @click="timeRange = '1y'; loadRotation()">1年</button>
        </div>

        <div class="flex items-center gap-1 text-sm">
            <span class="text-gray-500">粒度:</span>
            <button class="px-2 py-1 rounded text-xs"
                    :class="granularity === 'monthly' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'"
                    @click="granularity = 'monthly'; loadRotation()">月</button>
            <button class="px-2 py-1 rounded text-xs"
                    :class="granularity === 'weekly' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'"
                    @click="granularity = 'weekly'; loadRotation()">周</button>
        </div>

        <span x-show="loading" class="text-xs text-gray-400">
            <span class="inline-block w-3 h-3 border-2 border-gray-300 border-t-transparent rounded-full animate-spin mr-1"></span>
            加载中...
        </span>
    </div>

    <!-- Chart / empty state -->
    <div class="bg-white rounded-lg border mb-6">
        <div x-show="!rotationData || !rotationData.leaders || rotationData.leaders.length === 0"
             class="p-12 text-center text-gray-400">
            <p x-show="!rotationData">加载中...</p>
            <p x-show="rotationData && (!rotationData.leaders || rotationData.leaders.length === 0)">暂无轮动数据，请先点击"更新板块信息"生成数据</p>
        </div>
        <div id="rotation-chart" style="height: 400px;"
             :style="sectorCount > 0 ? 'height: ' + Math.max(300, sectorCount * 30 + 80) + 'px;' : ''"></div>
    </div>

    <!-- Unrotated sectors -->
    <div x-show="rotationData && rotationData.unrotated && rotationData.unrotated.length > 0" class="bg-white rounded-lg border p-4">
        <h4 class="text-sm font-semibold text-gray-700 mb-2">未参与轮动的板块</h4>
        <div class="flex flex-wrap gap-2">
            <template x-for="s in rotationData.unrotated" :key="s.sector_name">
                <a :href="'/sector-analysis/' + encodeURIComponent(s.sector_name)"
                   class="text-xs px-2 py-1 bg-gray-100 text-gray-500 rounded hover:bg-gray-200">
                    <span x-text="s.sector_name"></span>
                    <span x-show="s.sector_level" class="ml-1 text-gray-300" x-text="s.sector_level"></span>
                </a>
            </template>
        </div>
    </div>

</div>
